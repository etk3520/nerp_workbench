services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nerp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nerp}
      POSTGRES_DB: ${POSTGRES_DB:-nerp}
    volumes:
      - /mnt/hdd/nerp-postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nerp}"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-nerp}:${POSTGRES_PASSWORD:-nerp}@db:5432/${POSTGRES_DB:-nerp}
      DEBUG: ${DEBUG:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy

  auth:
    build:
      context: auth
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      COOKIE_SECRET: ${COOKIE_SECRET:-change-me-nerp}
      SESSION_DURATION: ${SESSION_DURATION:-86400}
      APP_NAME: ${APP_NAME:-N-ERP Workbench}
    volumes:
      - auth-data:/data

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - backend
      - auth

volumes:
  auth-data:
