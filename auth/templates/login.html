<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ app_name }} - Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,.1);
    }
    h1 { font-size: 1.4rem; text-align: center; margin-bottom: .25rem; color: #1976d2; }
    .subtitle { text-align: center; color: #666; font-size: .85rem; margin-bottom: 1.5rem; }
    .qr-wrap {
      text-align: center;
      margin: 1rem 0;
      padding: 1rem;
      background: #fafafa;
      border-radius: 8px;
    }
    .qr-wrap svg { width: 180px; height: 180px; }
    .secret-display {
      text-align: center;
      font-family: monospace;
      font-size: .8rem;
      color: #888;
      margin-top: .5rem;
      word-break: break-all;
    }
    details { margin-bottom: 1.5rem; }
    details summary {
      cursor: pointer;
      text-align: center;
      color: #1976d2;
      font-size: .85rem;
    }
    input[type="text"] {
      width: 100%;
      padding: .75rem 1rem;
      border: 2px solid #ddd;
      border-radius: 8px;
      background: #fafafa;
      color: #333;
      font-size: 1.25rem;
      text-align: center;
      letter-spacing: .3em;
      outline: none;
      transition: border-color .2s;
    }
    input:focus { border-color: #1976d2; }
    button {
      width: 100%;
      padding: .75rem;
      margin-top: .75rem;
      border: none;
      border-radius: 8px;
      background: #1976d2;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    button:hover { background: #1565c0; }
    .error {
      background: #fdecea;
      color: #d32f2f;
      padding: .5rem .75rem;
      border-radius: 6px;
      text-align: center;
      margin-bottom: 1rem;
      font-size: .85rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>{{ app_name }}</h1>
    <p class="subtitle">TOTP 인증 코드를 입력하세요</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    {% if qr_svg %}
    <details>
      <summary>QR 코드 보기 (최초 등록)</summary>
      <div class="qr-wrap">{{ qr_svg | safe }}</div>
      <div class="secret-display">{{ secret }}</div>
    </details>
    {% endif %}

    <form method="POST">
      <input type="text" name="code" maxlength="6" pattern="[0-9]{6}"
             placeholder="000000" autofocus autocomplete="one-time-code" required>
      <button type="submit">로그인</button>
    </form>
  </div>
</body>
</html>
