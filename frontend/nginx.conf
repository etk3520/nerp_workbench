# Rate limiting zones
limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # --- Security headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # --- Hide server info ---
    server_tokens off;

    # --- Block malicious paths ---
    location ~* ^/(\.env|\.git|wp-admin|wp-login|phpmyadmin|admin\.php|xmlrpc\.php|\.aws|\.ssh) {
        return 444;
    }

    # --- Block suspicious user agents ---
    if ($http_user_agent ~* (sqlmap|nikto|nmap|masscan|zgrab|dirbuster|gobuster|nuclei)) {
        return 444;
    }

    # --- TOTP auth via subrequest ---
    location = /_auth {
        internal;
        proxy_pass http://auth:5000/auth;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Cookie $http_cookie;
    }

    # Login page — no auth required, strict rate limit
    location /login {
        limit_req zone=login burst=3 nodelay;

        proxy_pass http://auth:5000/login;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Logout — no auth required
    location /logout {
        proxy_pass http://auth:5000/logout;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API proxy — auth required, rate limited
    location /api/ {
        auth_request /_auth;
        error_page 401 = @login_redirect;

        limit_req zone=api burst=50 nodelay;

        proxy_pass http://backend:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check proxy — no auth
    location /health {
        proxy_pass http://backend:8001;
    }

    # SPA fallback — auth required, rate limited
    location / {
        auth_request /_auth;
        error_page 401 = @login_redirect;

        limit_req zone=general burst=60 nodelay;

        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }

    # Redirect to login on 401
    location @login_redirect {
        return 302 $scheme://$http_host/login?rd=$request_uri;
    }

    # Block large request bodies
    client_max_body_size 10m;
}
